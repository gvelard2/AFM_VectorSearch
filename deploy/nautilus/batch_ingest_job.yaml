apiVersion: batch/v1
kind: Job
metadata:
  name: afm-batch-ingest
  namespace: gvelard2
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ingestion
          image: ghcr.io/gvelard2/afm-app:gpu
          imagePullPolicy: Always
          # Uses --csv mode so each file gets its own description from corpus_descriptions.csv
          command:
            - python
            - -m
            - ingestion.run
            - --csv
            - corpus_descriptions.csv
            - --data-dir
            - Data/
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: afm-secrets
                  key: db-url
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: afm-secrets
                  key: api-key
            - name: MODEL_NAME
              value: "microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224"
            - name: MODEL_VERSION
              value: "1.0.0"
          resources:
            requests:
              nvidia.com/gpu: 1
              cpu: "4"
              memory: "8Gi"
            limits:
              nvidia.com/gpu: 1   # GPU: requests must equal limits
              cpu: "4800m"        # 20% above 4 cores
              memory: "9830Mi"    # 20% above 8Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
