services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: afm
      POSTGRES_PASSWORD: afm
      POSTGRES_DB: afm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afm"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql+asyncpg://afm:afm@postgres:5432/afm
      MODEL_NAME: microsoft/BiomedCLIP-PubMedBERT_256-vit_base_patch16_224
      MODEL_VERSION: "1.0.0"
      API_KEY: changeme
    depends_on:
      postgres:
        condition: service_healthy

  streamlit:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api  # reuses same image
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      API_KEY: changeme
    depends_on:
      - api

volumes:
  pgdata:
